<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystic Fate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importing mystical serif fonts and Chinese fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@300;500;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
      /* Custom utilities for 3D effects */
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
      
      /* Floating Animation */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      /* Glow pulse */
      @keyframes glow {
        0% { box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        50% { box-shadow: 0 0 25px rgba(251, 191, 36, 0.6); }
        100% { box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
      }
      .animate-glow {
        animation: glow 3s ease-in-out infinite;
      }

      body {
        background-color: #050b14;
        color: #e2e8f0;
      }
    </style>
