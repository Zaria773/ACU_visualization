
<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystic Tarot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Serif SC', serif;
        background-color: #0f1c1e; /* Deep dark teal background */
      }
      .font-calligraphy {
        font-family: 'Zhi Mang Xing', cursive;
      }
      /* 3D Transform Utilities that Tailwind doesn't have by default */
      .perspective-1000 {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
      
      /* Floating Animation */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      /* Card Entrance */
      @keyframes deal {
        from { 
          opacity: 0;
          transform: translateY(100px) scale(0.8);
        }
        to { 
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .animate-deal {
        animation: deal 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      /* Vertical text utility */
      .writing-vertical {
        writing-mode: vertical-rl;
        text-orientation: upright;
      }
    </style>
